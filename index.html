<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LBac Fi Jib</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #111827, #05060a);
  color: white;
  display: flex;
  justify-content: center;
  padding: 15px;
}

/* CONTAINER */
.container {
  width: 100%;
  max-width: 480px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 18px;
  border-radius: 14px;
}

/* TITLE */
h1 {
  text-align: center;
  font-weight: 800;
  color: #00e5c4;
  font-size: 22px;
}

.subtitle {
  text-align: center;
  font-size: 12px;
  opacity: 0.7;
  margin-bottom: 15px;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  margin: 8px 0 12px;
  border-radius: 10px;
  border: none;
  background: rgba(0,0,0,0.4);
  color: white;
  font-size: 16px;
  box-sizing: border-box;
}

/* GRID */
.matiere-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.cb-item {
  padding: 12px;
  text-align: center;
  background: rgba(255,255,255,0.06);
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  transition: 0.2s;
  user-select: none;
}

.cb-item.checked {
  background: #00e5c4;
  color: black;
  font-weight: 600;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg, #00e5c4, #00b3ff);
  font-weight: 700;
  cursor: pointer;
  color: black;
  font-size: 15px;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: flex;
  justify-content: center;
  align-items: center;
}

.hidden { display: none; }

.modal-content {
  width: 92%;
  max-width: 400px;
  background: #0f172a;
  padding: 16px;
  border-radius: 14px;
}

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.cancel {
  flex: 1;
  background: #ef4444;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 10px;
}

.confirm {
  flex: 1;
  background: #00e5c4;
  color: black;
  border: none;
  padding: 10px;
  border-radius: 10px;
}

/* LOADING */
.loading {
  text-align: center;
  padding: 20px;
}

/* SUCCESS */
.success {
  text-align: center;
  padding: 20px;
  display: none;
}

.success h2 {
  color: #00e5c4;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(0,229,196,0.2);
  border-top-color: #00e5c4;
  border-radius: 50%;
  margin: auto;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

</style>
</head>

<body>

<div class="container" id="formBox">

<h1>LBac Fi Jib</h1>
<div class="subtitle">Inscription intelligente</div>

<input id="nom" placeholder="Nom">
<input id="prenom" placeholder="Prénom">
<input id="filiere" placeholder="Filière">

<div class="matiere-grid">
  <div class="cb-item" onclick="toggle(this)">Math</div>
  <div class="cb-item" onclick="toggle(this)">Physique</div>
  <div class="cb-item" onclick="toggle(this)">Info</div>
  <div class="cb-item" onclick="toggle(this)">Anglais</div>
</div>

<button onclick="submitForm()">🚀 Envoyer</button>

</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h3>🔎 Vérification</h3>
    <div id="review"></div>

    <div class="modal-actions">
      <button class="cancel" onclick="closeModal()">Modifier</button>
      <button class="confirm" onclick="confirmSubmit()">Confirmer</button>
    </div>
  </div>
</div>

<!-- LOADING -->
<div id="loading" class="modal hidden">
  <div class="loading">
    <div class="spinner"></div>
    <p>Envoi en cours...</p>
  </div>
</div>

<!-- SUCCESS -->
<div id="success" class="success">
  <h2>✅ Remplissage fait</h2>
  <p>Ton formulaire a été envoyé avec succès</p>
  <button onclick="resetForm()">Nouveau formulaire</button>
</div>

<script>

const SHEET_URL = "https://script.google.com/macros/s/AKfycbzr2mPB5o3yA2-kwVSTFSnVySxB875zzJHCyFmnXKupmsOQeQunFgmecLWEZzYDsJNP/exec";

let selected = [];

function toggle(el){
  el.classList.toggle("checked");
  const val = el.textContent;

  if(selected.includes(val)){
    selected = selected.filter(v => v !== val);
  } else {
    selected.push(val);
  }
}

function submitForm(){

  const nom = document.getElementById("nom").value.trim();
  const prenom = document.getElementById("prenom").value.trim();
  const filiere = document.getElementById("filiere").value.trim();

  if(!nom || !prenom || !filiere || selected.length === 0){
    alert("Remplis tous les champs !");
    return;
  }

  document.getElementById("review").innerHTML = `
    <p><b>Nom:</b> ${nom}</p>
    <p><b>Prénom:</b> ${prenom}</p>
    <p><b>Filière:</b> ${filiere}</p>
    <p><b>Matières:</b> ${selected.join(", ")}</p>
  `;

  document.getElementById("modal").classList.remove("hidden");
}

function closeModal(){
  document.getElementById("modal").classList.add("hidden");
}

function confirmSubmit(){

  const nom = document.getElementById("nom").value.trim();
  const prenom = document.getElementById("prenom").value.trim();
  const filiere = document.getElementById("filiere").value.trim();

  document.getElementById("modal").classList.add("hidden");
  document.getElementById("loading").classList.remove("hidden");

  const form = document.createElement("form");
  form.method = "POST";
  form.action = SHEET_URL;

  const data = {
    nom,
    prenom,
    filiere,
    matieres: selected.join(", ")
  };

  for(let key in data){
    const input = document.createElement("input");
    input.name = key;
    input.value = data[key];
    form.appendChild(input);
  }

  document.body.appendChild(form);
  form.submit();

  setTimeout(() => {
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("formBox").style.display = "none";
    document.getElementById("success").style.display = "block";
  }, 1000);
}

function resetForm(){
  location.reload();
}

</script>

</body>
</html>
