<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<!-- IMPORTANT MOBILE FIX -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LBac Fi Jib - Inscription</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #111827, #05060a);
  color: white;
  display: flex;
  justify-content: center;
  padding: 40px;
}

.container {
  width: 100%;
  max-width: 520px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 25px;
  border-radius: 18px;
  box-shadow: 0 0 25px rgba(0,229,196,0.15);
  animation: fadeIn 0.6s ease;
}

h1 {
  text-align: center;
  font-weight: 800;
  margin-bottom: 5px;
  color: #00e5c4;
}

.subtitle {
  text-align: center;
  font-size: 13px;
  opacity: 0.7;
  margin-bottom: 20px;
}

label {
  font-size: 13px;
  opacity: 0.8;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0 15px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(0,0,0,0.3);
  color: white;
  outline: none;
  transition: 0.3s;
  box-sizing: border-box;
  font-size: 16px;
}

input:focus {
  border-color: #00e5c4;
  box-shadow: 0 0 10px rgba(0,229,196,0.2);
}

.section-title {
  margin-top: 15px;
  font-weight: 600;
}

.matiere-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 10px;
}

.cb-item {
  padding: 12px;
  text-align: center;
  background: rgba(255,255,255,0.06);
  border-radius: 10px;
  cursor: pointer;
  transition: 0.25s;
  border: 1px solid transparent;
  user-select: none;
}

.cb-item:hover {
  transform: scale(1.03);
  border-color: rgba(0,229,196,0.4);
}

.cb-item.checked {
  background: #00e5c4;
  color: black;
  font-weight: 600;
  box-shadow: 0 0 15px rgba(0,229,196,0.4);
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg, #00e5c4, #00b3ff);
  font-weight: 700;
  cursor: pointer;
  color: black;
  transition: 0.3s;
  font-size: 15px;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(0,229,196,0.2);
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 100;
}

.hidden { display: none; }

.modal-content {
  width: 90%;
  max-width: 420px;
  background: #0f172a;
  padding: 20px;
  border-radius: 14px;
}

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.cancel {
  flex: 1;
  background: #ef4444;
  color: white;
  padding: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  margin-top: 0;
}

.confirm {
  flex: 1;
  background: #00e5c4;
  color: black;
  padding: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  margin-top: 0;
}

/* SUCCESS */
.success-content {
  width: 90%;
  max-width: 420px;
  background: #0f172a;
  padding: 30px 20px;
  border-radius: 14px;
  box-shadow: 0 0 40px rgba(0,229,196,0.3);
  text-align: center;
}

/* LOADING */
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(0,229,196,0.2);
  border-top-color: #00e5c4;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: auto;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* RESPONSIVE MOBILE FIX */
@media (max-width: 768px) {

  body {
    padding: 12px;
    align-items: flex-start;
  }

  .container {
    padding: 16px;
    border-radius: 14px;
  }

  h1 {
    font-size: 20px;
  }

  .subtitle {
    font-size: 12px;
  }

  .matiere-grid {
    gap: 8px;
  }

  .cb-item {
    padding: 10px;
    font-size: 13px;
  }

  button {
    padding: 14px;
  }

  .modal-actions {
    flex-direction: column;
  }

  .cancel, .confirm {
    width: 100%;
  }
}

@media (max-width: 380px) {
  .matiere-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<!-- TON HTML ORIGINAL (inchangé) -->
<div class="container">

  <h1>LBac Fi Jib</h1>
  <div class="subtitle">Inscription intelligente pour ton parcours scolaire</div>

  <label>Nom</label>
  <input type="text" id="nom">

  <label>Prénom</label>
  <input type="text" id="prenom">

  <label>Filière</label>
  <input type="text" id="filiere">

  <div class="section-title">📚 Matières</div>

  <div class="matiere-grid">
    <div class="cb-item" onclick="toggle(this)">Français</div>
    <div class="cb-item" onclick="toggle(this)">Anglais</div>
    <div class="cb-item" onclick="toggle(this)">Histoire</div>
    <div class="cb-item" onclick="toggle(this)">Géographie</div>
    <div class="cb-item" onclick="toggle(this)">Philosophie</div>
  </div>

  <button onclick="submitForm()">🚀 Envoyer</button>

</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h3>🔎 Vérification</h3>
    <div id="review"></div>

    <div class="modal-actions">
      <button class="cancel" onclick="closeModal()">Modifier</button>
      <button class="confirm" onclick="confirmSubmit()">Confirmer</button>
    </div>
  </div>
</div>

<script>
// TON JS RESTE IDENTIQUE (non modifié)
function toggle(el){
  el.classList.toggle("checked");
}

function submitForm(){
  const nom = document.getElementById("nom").value.trim();
  const prenom = document.getElementById("prenom").value.trim();
  const filiere = document.getElementById("filiere").value.trim();

  const matieres = Array.from(document.querySelectorAll(".cb-item.checked"))
    .map(e => e.textContent).join(", ");

  if(!nom || !prenom || !filiere || !matieres){
    alert("Remplis tous les champs !");
    return;
  }

  document.getElementById("review").innerHTML = `
    <p><b>Nom:</b> ${nom}</p>
    <p><b>Prénom:</b> ${prenom}</p>
    <p><b>Filière:</b> ${filiere}</p>
    <p><b>Matières:</b> ${matieres}</p>
  `;

  document.getElementById("modal").classList.remove("hidden");
}

function closeModal(){
  document.getElementById("modal").classList.add("hidden");
}

function confirmSubmit(){
  alert("Formulaire envoyé !");
}
</script>

</body>
</html>
